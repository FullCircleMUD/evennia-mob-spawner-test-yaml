# Wilderness zone — minimal fixture with a single rule, for tests that
# need a second rule-set file in shard0 without much content in it.

rules:
  - rule_id: 1
    typeclass: typeclasses.test_mobs.Rabbit
    key: a rabbit
    area_tag: meadow_rabbits
    target: 8
    max_per_room: 1
    respawn_seconds: 60
    # Demonstrates all three accepted shapes for the `tags:` field.
    # Each spawned rabbit carries every tag listed here, in addition
    # to the library-stamped area_tag + identity tags.
    tags:
      - harvestable                                        # bare string → category=None
      - {key: corpse_loot}                                 # dict, key only → category=None
      - {key: spawn_resources, category: spawn_resources}  # dict, key + category
